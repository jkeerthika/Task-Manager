<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <h1>MY TASK MANAGER ✉️</h1>
        <div class="box">
            <div class="firstrow">
                <input type="text" id = "input" placeholder="Enter a new task...">
                <button type = "button" id = "task">Add Task</button>
            </div>
            <div class="secondrow">
                <div class="firstbuttons">
                    <button type = "button" id = "all">All</button>
                    <button type = "button" id = "Pending">Pending</button>
                    <button type = "button" id = "completed">Completed</button>
                </div>
                <div class="secondbutton">
                    <button type = "button" id = "clear">Clear Completed</button>
                </div>
            </div>
            <div class="listbox">
                <p class="empty">No tasks here.</p>
                
            </div>
            <div class="listouttask">
                <div class="total">
                    <p class="TaskCount">Total Task</p>
                    <span class="countTask">0</span>
                </div>
                <div class="completedlist">
                    <p class="CompletedCount">Completed</p>
                    <span class="countcompleted">0</span>
                </div>
                <div class="pendinglist">
                    <p class="pendingcount">Pending</p>
                    <span class="countpending">0</span>
                </div>
            </div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
